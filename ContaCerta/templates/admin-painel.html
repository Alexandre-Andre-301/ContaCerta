<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaCerta - Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../static/admin.css">
       <link rel="shortcut icon" href="../static/favicon.png" type="image/x-icon">
</head>
<body>

    <div class="layout-wrapper">
        
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i class="ri-store-3-fill"></i></div>
                <span class="logo-text">ContaCerta</span>
            </div>

            <nav class="nav-links">
                <a href="{{url_for('admin_painel')}}" class="nav-item active">
                    <i class="ri-dashboard-fill"></i>
                    <span>Dashboard</span>
                </a>
                <a href="{{url_for('vendas')}}" class="nav-item">
                    <i class="ri-bar-chart-box-line"></i>
                    <span>Vendas</span>
                </a>
                <a href="{{url_for('produtos')}}" class="nav-item">
                    <i class="ri-box-3-line"></i>
                    <span>Produtos</span>
                </a>
                <a href="{{url_for('relatorios')}}" class="nav-item">
                    <i class="ri-file-list-3-line"></i>
                    <span>Relatórios</span>
                </a>
            </nav>

            <div class="nav-footer">
                <a href="{{url_for('logout')}}" class="nav-item logout">
                    <i class="ri-logout-box-line"></i>
                    <span>Sair</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="topbar">
                <h2 class="page-title">Dashboard</h2>
                
                <div class="user-area">
                    <button class="icon-btn notification-btn">
                        <i class="ri-notification-3-line"></i>
                        <span class="dot"></span>
                    </button>
                    <div class="avatar">
                        <img src="https://i.pravatar.cc/150?img=11" alt="User">
                    </div>
                </div>
            </header>

           <div class="dashboard-grid">
    <div class="card card-dark">
        <div class="card-header"><span>Vendas Hoje</span></div>
        <div class="card-value">
            <span class="currency">Kz</span>
            <span class="counter" id="vendasHoje" data-target="0">0</span>
        </div>
        <div class="card-pattern"><span></span><span></span><span></span><span></span></div>
    </div>

    <div class="card card-dark">
        <div class="card-header"><span>Produtos no Sistema</span></div>
        <div class="card-value">
            <span class="counter" id="totalProdutos" data-target="0">0</span>
        </div>
        <div class="card-pattern"><span></span><span></span><span></span><span></span></div>
    </div>

    <div class="card card-green">
        <div class="card-header"><span>Lucro Bruto (Total)</span></div>
        <div class="card-value">
            <span class="currency">Kz</span>
            <span class="counter" id="lucroTotal" data-target="0">0</span>
        </div>
        <div class="card-pattern pattern-light"><span></span><span></span><span></span><span></span></div>
    </div>
</div>
    <div id="modalPerfil" class="modal-overlay" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
    <div class="modal-content animate-pop" style="background: var(--bg-card); padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border-color);">
        <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h3 style="color: var(--text-white);">Configurações</h3>
            <button onclick="fecharModalPerfil()" style="background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;">&times;</button>
        </div>

        <div class="modal-body">
            <div style="text-align: center; margin-bottom: 2rem; position: relative;">
                <div style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; margin: 0 auto 10px; border: 3px solid var(--primary-green);">
                    <img src="https://i.pravatar.cc/150?img=11" id="previewFoto" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <label for="inputFoto" style="color: var(--primary-green); font-size: 0.8rem; cursor: pointer; font-weight: 600;">
                    <i class="ri-camera-switch-line"></i> Mudar Foto
                </label>
                <input type="file" id="inputFoto" hidden accept="image/*" onchange="previewImage(this)">
            </div>

            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; display: block;">Nome de Exibição</label>
                    <input type="text" id="nomeUsuario" value="Administrador" style="width: 100%; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 8px; color: white;">
                </div>
                <div>
                    <label style="color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 5px; display: block;">Alterar Senha</label>
                    <input type="password" id="novaSenha" placeholder="Nova senha (opcional)" style="width: 100%; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 8px; color: white;">
                </div>
            </div>
        </div>

        <div class="modal-footer" style="margin-top: 2rem;">
            <button onclick="salvarPerfil()" class="btn-primary" style="width: 100%; padding: 14px; border-radius: 8px; background: var(--primary-green); border: none; color: white; font-weight: 600; cursor: pointer;">
                Guardar Alterações
            </button>
        </div>
    </div>
</div>
        </main>
    </div>

    <script src="../static/admin.js"></script>
</body>
</html>
