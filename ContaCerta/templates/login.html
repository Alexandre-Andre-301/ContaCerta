<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaCerta - Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/login.css">
       <link rel="shortcut icon" href="../static/favicon.png" type="image/x-icon">
</head>
<body>
    
   <div class="login-wrapper">
       
        <div class="login-card animate-entry">
             
             <div class="header-section">
                 <h1>ContaCerta</h1>
                 <p class="subtitle">Acesso ao sistema</p>
             </div>
            
             <form class="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="text" id="email" class="input-field nome" placeholder="exemplo@email.com" autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" class="input-field senha" placeholder="••••••••" autocomplete="current-password">
                </div>

                <div class="error-container">
                    <p class="resul"></p>
                </div>
                
                <button type="button" class="btn-primary">
                    <span class="btn-text">Entrar</span>
                    <span class="loader"></span> </button>
             </form>
             <div style="text-align: center; margin-top: 15px;">
    <a href="javascript:void(0)" onclick="abrirModalEsqueci()" style="color: var(--text-muted); font-size: 13px; text-decoration: none;">Esqueceu-se da palavra-passe?</a>
</div>

<div id="modalRecuperar" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
    <div style="background: var(--bg-card); padding: 30px; border-radius: 16px; width: 100%; max-width: 350px; border: 1px solid var(--border-color); text-align: center;">
        <h3 style="color: var(--text-white); margin-bottom: 10px;">Recuperar Acesso</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">Introduza o seu e-mail para receber uma senha temporária.</p>
        
        <input type="email" id="emailRecuperar" class="input-field" placeholder="seu-email@exemplo.com" style="margin-bottom: 20px;">
        
        <div style="display: flex; gap: 10px;">
            <button onclick="fecharModalEsqueci()" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: transparent; color: var(--text-white); cursor: pointer;">Cancelar</button>
            <button id="btnEnviarRecuperacao" onclick="enviarRecuperacao()" style="flex: 2; padding: 12px; border-radius: 8px; border: none; background: var(--primary-green); color: white; font-weight: 600; cursor: pointer;">Enviar E-mail</button>
        </div>
    </div>
</div>

             <div class="footer-links">
                 <p>Não tem uma conta? <a href="{{url_for('setup')}}">Criar conta</a></p>
             </div>

        </div>
   </div>

   <script src="../static/login.js"></script>
</body>
</html
