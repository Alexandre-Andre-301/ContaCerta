<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaCerta - Vendas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="../static/admin.css"> <link rel="stylesheet" href="../static/vendas.css">
</head>
<body>

    <div class="layout-wrapper">
         <aside class="sidebar">
    <div class="logo-area">
        <div class="logo-icon"><i class="ri-store-3-fill"></i></div>
        <span class="logo-text">ContaCerta</span>
    </div>

    <nav class="nav-links">
        <a href="{{url_for('admin_painel')}}" class="nav-item {{ 'active' if request.endpoint == 'admin_painel' }}">
            <i class="ri-dashboard-fill"></i>
            <span>Dashboard</span>
        </a>
        <a href="{{url_for('vendas')}}" class="nav-item {{ 'active' if request.endpoint == 'vendas' }}">
            <i class="ri-bar-chart-box-line"></i>
            <span>Vendas</span>
        </a>
        <a href="{{url_for('produtos')}}" class="nav-item">
            <i class="ri-box-3-line"></i>
            <span>Produtos</span>
        </a>
        <a href="{{url_for('relatorios')}}" class="nav-item">
                    <i class="ri-file-list-3-line"></i>
                    <span>Relatórios</span>
                </a>
    </nav>

    <div class="nav-footer">
        <a href="{{url_for('logout')}}" class="nav-item logout">
            <i class="ri-logout-box-line"></i>
            <span>Sair</span>
        </a>
    </div>
</aside>


        <main class="main-content">
            <header class="topbar">
                <h2 class="page-title">Relatório de Vendas</h2>
            </header>

            <div class="vendas-container">
                <div class="analytics-grid">
                    
                    <div class="chart-card">
                        <div class="chart-info">
                            <h3>Vendas Semanais</h3>
                            <p>Desempenho dos últimos 7 dias</p>
                        </div>
                        <div class="canvas-wrapper">
                            <canvas id="vendasChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-card">
                        <div class="chart-info">
                            <h3>Evolução de Lucro</h3>
                            <p>Crescimento líquido em Kz</p>
                        </div>
                        <div class="canvas-wrapper">
                            <canvas id="lucroChart"></canvas>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>
    

    <script src="../static/vendas.js"></script>
</body>
</html>
